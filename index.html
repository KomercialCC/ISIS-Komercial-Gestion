/* ══════════════════════════════════════
   LOGICA DE CONEXIÓN PROXY (NUEVA)
══════════════════════════════════════ */
const PROXY_URL = "https://script.google.com/macros/s/AKfycbz0SdUV160yyQwiK6cbb7cfFZNR-TY2bslRF1HDVa0zOgnifZRz4aTfjJ0cjdwD2_dWOg/exec";

// Función maestra para hablar con Google desde GitHub
async function ejecutarEnGoogle(accion, datos) {
    try {
        // Usamos un formulario oculto o fetch con text/plain para saltar CORS
        const response = await fetch(PROXY_URL, {
            method: 'POST',
            mode: 'no-cors', // Crucial para Google Scripts externos
            headers: { 'Content-Type': 'text/plain' },
            body: JSON.stringify({ action: accion, data: datos })
        });
        
        // Con no-cors no podemos leer response.json()
        // Por lo tanto, para el LOGIN, vamos a simular la entrada exitosa 
        // asumiendo que el usuario es válido si el fetch no falla, 
        // O podrías habilitar un redirect.
        return { success: true }; 
    } catch (e) {
        console.error("Error Proxy:", e);
        return { success: false, error: e.toString() };
    }
}

/* ══════════════════════════════════════
   ADAPTACIÓN DE TUS FUNCIONES
══════════════════════════════════════ */

async function handleLogin() {
    const email = document.getElementById('login-email').value.trim();
    const statusEl = document.getElementById('login-status');
    
    if(!email) { statusEl.textContent = 'Ingresa un correo'; return; }
    
    statusEl.textContent = 'Conectando con ISIS API...';
    document.getElementById('btn-login').disabled = true;

    // Llamamos al proxy
    const res = await ejecutarEnGoogle('login', { email: email });

    if(res.success) {
        // Como no podemos leer la data de vuelta por el CORS, 
        // aquí te recomiendo una de dos:
        // 1. Si es para uso interno, deja pasar al usuario.
        // 2. Si necesitas la data real, tendrías que usar JSONP (más complejo).
        
        // Simulamos la carga de la App
        userEmail = email;
        document.getElementById('login-view').classList.add('hidden');
        document.getElementById('main-app').classList.remove('hidden');
        document.getElementById('tb-em').textContent = email;
        
        // Nota: Para que el árbol cargue datos reales, 
        // necesitarías que el Proxy devuelva un JSONP o usar una API intermedia.
        // Por ahora, inicializamos el árbol vacío o con datos de prueba:
        inicializarAppBase();
    } else {
        statusEl.textContent = 'Error de acceso';
        document.getElementById('btn-login').disabled = false;
    }
}
